<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="stylesheets/rover.css">
    <title>PICSES Helelani Rover</title>
</head>

<body>
<div class="login-overlay show" id="login-overlay">
    <div class="login-dialog">
        <h2>XMPP Login</h2>
        <div class="error" id="login-error">Login failed</div>
        <input type="text" id="jid" placeholder="JID (e.g., user@example.com)" />
        <input type="password" id="password" placeholder="Password" />
        <div class="buttons">
            <button id="cancel-login">Cancel</button>
            <button id="submit-login">Login</button>
        </div>
    </div>
</div>

<div class="navbar">
    <div class="nav-actions">
        <h1>Helelani Rover Control Panel</h1>
        <button id="login-btn">Login</button>
    </div>
    <div class="window-controls ghost-style">
        <!-- I promise there is emojis there idk why its not showing in clion -->
        <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
        <button id="debug-btn" aria-label="show developer tools">🛠️</button>
        <button id="min-btn" aria-label="Minimize">—</button>
        <button id="max-btn" aria-label="Maximize">▢</button>
        <button id="close-btn" aria-label="Close">✕</button>
    </div>
</div>

<div class="dashboard">
    <div class="panel status">
        <h2>Rover Status</h2>
        <p id="status-battery">Battery: --%</p>
        <p id="status-signal">Signal: --</p>
        <p id="status-speed">Speed: --</p>
    </div>

    <div class="panel controls">
        <h2>Rover Controls</h2>
        <div class="control-grid">
            <button data-command="rover::movements::forward" disabled>Forward</button>
            <button data-command="rover::movements::turn_right" disabled>Turn Right</button>
            <button data-command="rover::movements::backward" disabled>Backwards</button>
            <button data-command="rover::movements::left" disabled>Left</button>
            <button data-command="rover::movements::stop" disabled>Stop</button>
            <button data-command="rover::movements::right" disabled>Right</button>
        </div>
    </div>

    <div class="panel location">
        <h2>Rover Location</h2>
        <div class="rover-location">Live Rover Location</div>
    </div>

    <div class="panel camera">
        <h2><a href="camera.html">Rover Camera</a></h2>
        <div class="camera-feed">Live Camera Feed</div>
    </div>

    <div class="panel log">
        <h2>Command Log</h2>
        <div class="log-box" id="log-box">
            [--:--] Awaiting connection...
        </div>
    </div>
</div>

<script type="module">
    /**
     * PIVOT NOTE: We removed the Wails imports.
     * Saucer automatically injects 'window.saucer' into the page.
     */
    const saucer = window.saucer;

    // DOM Elements
    const overlay = document.getElementById('login-overlay');
    const loginBtn = document.getElementById('login-btn');
    const cancelBtn = document.getElementById('cancel-login');
    const submitBtn = document.getElementById('submit-login');
    const jidInput = document.getElementById('jid');
    const passwordInput = document.getElementById('password');
    const errorMsg = document.getElementById('login-error');
    const logBox = document.getElementById('log-box');
    const controlButtons = document.querySelectorAll('.control-grid button');

    // Status elements
    const statusBattery = document.getElementById('status-battery');
    const statusSignal = document.getElementById('status-signal');
    const statusSpeed = document.getElementById('status-speed');

    function setControlsEnabled(enabled) {
        controlButtons.forEach(btn => {
            btn.disabled = !enabled;
        });
    }

    function addLog(time, message) {
        logBox.innerHTML += `<br/>[${time}] ${message}`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    /**
     * EVENTS: Replaced Wails EventsOn with saucer.on
     */
    // saucer.on('status-update', (data) => {
    //     switch (data.type) {
    //         case 'battery': statusBattery.textContent = data.value; break;
    //         case 'signal':  statusSignal.textContent = data.value; break;
    //         case 'speed':   statusSpeed.textContent = data.value; break;
    //     }
    // });
    //
    // saucer.on('log-message', (data) => {
    //     addLog(data.time, data.message);
    // });
    //
    // saucer.on('connected', (success) => {
    //     if (success) {
    //         setControlsEnabled(true);
    //         addLog(new Date().toLocaleTimeString(), 'Connected to XMPP server');
    //     }
    // });

    // ... existing DOM elements
    const navbar = document.querySelector('.navbar');

    navbar.addEventListener('mousedown', (e) => {

        console.log("mousedown")

        // Prevent dragging if the user clicks a button or a link inside the navbar
        if (e.target.tagName === 'BUTTON' || e.target.tagName === 'A' || e.target.closest('button')) {
            return;
        }

        // Call the Saucer native drag function
        // Note: Use the exact method name provided by your specific Saucer version (usually start_drag)
        if (window.saucer && window.saucer.startDrag) {
            console.log("start drag")
            window.saucer.startDrag();
        }
    });

    let devtoolsShown = false;

    let debugBtn = document.getElementById('debug-btn');
    debugBtn.addEventListener('click', () => {
        devtoolsShown = !devtoolsShown;
        window.saucer.exposed.toggleDevTools(devtoolsShown);
    })

    let isMaximized = false;

    const minBtn = document.getElementById('min-btn');
    const maxBtn = document.getElementById('max-btn');
    const closeBtn = document.getElementById('close-btn');

    minBtn.addEventListener('click', () => {
        window.saucer.minimize(true);
    });

    maxBtn.addEventListener('click', () => {
        isMaximized = !isMaximized;
        window.saucer.maximize(isMaximized);

        // Optional: Toggle symbol between '▢' and '❐'
        maxBtn.textContent = isMaximized ? '❐' : '▢';
    });

    closeBtn.addEventListener('click', () => {
        window.saucer.close();
    });

    // UI Handlers
    loginBtn.addEventListener('click', () => {
        overlay.classList.add('show');
        jidInput.focus();
    });

    cancelBtn.addEventListener('click', () => {
        overlay.classList.remove('show');
        errorMsg.classList.remove('show');
    });

    /**
     * BINDINGS: Replaced Wails Go calls with saucer.exposed
     */
    submitBtn.addEventListener('click', async () => {
        const jid = jidInput.value;
        const password = passwordInput.value;

        if (!jid || !password) {
            errorMsg.textContent = 'Please enter JID and password';
            errorMsg.classList.add('show');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Connecting...';

        try {
            // Call C++ function app.expose("Login", ...)
            await saucer.exposed.Login(jid, password);

            overlay.classList.remove('show');
            loginBtn.textContent = 'Connected';
            loginBtn.disabled = true;
            addLog(new Date().toLocaleTimeString(), 'Logging in as ' + jid);
            setControlsEnabled(true);
        } catch (err) {
            errorMsg.textContent = err;
            errorMsg.classList.add('show');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Login';
        }
    });

    controlButtons.forEach(btn => {
        btn.addEventListener('click', async () => {
            const command = btn.dataset.command;
            if (!command) return;

            try {
                // Call C++ function app.expose("SendCommand", ...)
                await saucer.exposed.SendCommand(command);
            } catch (err) {
                addLog(new Date().toLocaleTimeString(), 'Error: ' + err);
            }
        });
    });

    // Theme toggle (Standard JS, no changes needed)
    const toggleButton = document.getElementById('theme-toggle');
    const body = document.body;
    const themeKey = 'theme';
    const darkModeClass = 'dark-mode';

    function setTheme(theme) {
        if (theme === 'dark') {
            body.classList.add(darkModeClass);
            localStorage.setItem(themeKey, 'dark');
        } else {
            body.classList.remove(darkModeClass);
            localStorage.setItem(themeKey, 'light');
        }
    }

    toggleButton.addEventListener('click', () => {
        body.classList.contains(darkModeClass) ? setTheme('light') : setTheme('dark');
    });

    const savedTheme = localStorage.getItem(themeKey);
    if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        setTheme('dark');
    }
</script>
</body>
</html>
