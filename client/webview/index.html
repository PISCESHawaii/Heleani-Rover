<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="stylesheets/rover.css">
    <title>PICSES Helelani Rover</title>
</head>

<body>
<div class="login-overlay show" id="login-overlay">
    <div class="login-dialog">
        <h2>XMPP Login</h2>
        <div class="error" id="login-error">Login failed</div>
        <input type="text" id="jid" placeholder="JID (e.g., user@example.com)"/>
        <input type="password" id="password" placeholder="Password"/>
        <div class="buttons">
            <button id="cancel-login">Cancel</button>
            <button id="submit-login">Login</button>
        </div>
    </div>
</div>

<div class="navbar">
    <div class="nav-actions">
        <h1>Helelani Rover Control Panel</h1>
        <button id="login-btn">Login</button>
    </div>
    <div class="window-controls ghost-style">
        <!-- I promise there is emojis there idk why its not showing in clion -->
        <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
        <button id="debug-btn" aria-label="show developer tools">🛠️</button>
        <button id="min-btn" aria-label="Minimize">—</button>
        <button id="max-btn" aria-label="Maximize">▢</button>
        <button id="close-btn" aria-label="Close">✕</button>
    </div>
</div>

<div class="dashboard">
    <div class="panel status">
        <h2>Rover Status</h2>
        <p id="status-battery">Battery: --%</p>
        <p id="status-signal">Signal: --</p>
        <p id="status-speed">Speed: --</p>
    </div>

    <div class="panel controls">
        <h2>Rover Controls</h2>
        <div class="control-grid" id="control-grid">
            <!-- Buttons will be dynamically populated here -->
        </div>
    </div>

    <div class="panel location">
        <h2>Rover Location</h2>
        <div class="rover-location">Live Rover Location</div>
    </div>

    <div class="panel camera">
        <h2><a href="camera.html">Rover Camera</a></h2>
        <div id="camera-feed" class="camera-feed"></div>
    </div>

    <div class="panel log">
        <h2>Command Log</h2>
        <div class="log-box" id="log-box">
            [--:--] Awaiting connection...
        </div>
    </div>
</div>

<script type="module" src="js/index.js" defer></script>
</body>
</html>
